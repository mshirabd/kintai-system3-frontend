<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>出退勤打刻</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    .attendance-header { text-align: center; padding: 16px 0; }
    .emp-name { font-size: 22px; font-weight: bold; }
    .store-name { font-size: 14px; color: #666; }
    .today-logs { margin: 12px 0; }
    .today-logs .log-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 12px;
      background: #f8f9fa;
      border-radius: 4px;
      margin: 4px 0;
      font-size: 14px;
    }
    #result {
      text-align: center;
      padding: 16px;
      margin: 12px 0;
      border-radius: 8px;
      font-size: 16px;
      display: none;
    }
    .back-link { text-align: center; margin-top: 20px; }
    .back-link a { color: #1A73E8; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container-narrow">
    <div class="card">
      <div class="attendance-header">
        <div class="clock" id="clock"></div>
        <div class="emp-name" id="empName">読み込み中...</div>
        <div class="store-name" id="storeName"></div>
      </div>

      <div class="punch-buttons" id="punchButtons">
        <button class="punch-btn clock-in" data-type="出勤">出勤</button>
        <button class="punch-btn clock-out" data-type="退勤">退勤</button>
        <button class="punch-btn break-start" data-type="休憩開始">休憩開始</button>
        <button class="punch-btn break-end" data-type="休憩終了">休憩終了</button>
        <button class="punch-btn meal" data-type="賄い(昼)">賄い(昼)</button>
        <button class="punch-btn meal" data-type="賄い(夜)">賄い(夜)</button>
      </div>

      <div id="result"></div>

      <div class="today-logs">
        <h3 style="font-size:14px;color:#666;margin-bottom:6px;">本日の打刻</h3>
        <div id="todayLogs"></div>
      </div>
    </div>

    <div class="back-link">
      <a href="index.html">QRスキャン画面に戻る</a>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    const params = new URLSearchParams(location.search);
    const employeeCode = params.get('id') || '';
    if (!employeeCode) {
      location.href = 'index.html';
    }

    let employeeInfo = null;

    startClock('clock');

    async function init() {
      try {
        const res = await api.getEmployeeInfo(employeeCode);
        if (!res.success) {
          document.getElementById('empName').textContent = res.message || 'エラー';
          return;
        }
        employeeInfo = res;
        document.getElementById('empName').textContent = res.employeeName;
        document.getElementById('storeName').textContent = res.storeName;
        renderTodayLogs(res.todayLogs || []);
        updateButtons(res.todayLogs || []);
      } catch (e) {
        document.getElementById('empName').textContent = '通信エラー';
      }
    }

    function renderTodayLogs(logs) {
      const el = document.getElementById('todayLogs');
      if (logs.length === 0) {
        el.innerHTML = '<div style="color:#999;font-size:13px;">まだ打刻がありません</div>';
        return;
      }
      el.innerHTML = logs.map(l =>
        `<div class="log-item"><span>${escHtml(l.type)}</span><span>${escHtml(l.time)}</span></div>`
      ).join('');
    }

    function updateButtons(logs) {
      const types = logs.map(l => l.type);
      const buttons = document.querySelectorAll('.punch-btn');
      buttons.forEach(btn => {
        const type = btn.dataset.type;
        const isMeal = type.startsWith('賄い');
        if (!isMeal && types.includes(type)) {
          btn.disabled = true;
        }
      });
    }

    // 打刻ボタンクリック
    document.getElementById('punchButtons').addEventListener('click', async (e) => {
      const btn = e.target.closest('.punch-btn');
      if (!btn || btn.disabled) return;

      const type = btn.dataset.type;
      btn.disabled = true;

      const resultEl = document.getElementById('result');
      resultEl.style.display = 'block';
      resultEl.className = '';
      resultEl.textContent = '送信中...';

      try {
        const res = await api.processAttendance({
          employeeId: employeeCode,
          attendanceType: type,
        });
        if (res.success) {
          resultEl.className = 'success-message';
          resultEl.textContent = res.message;
          // 再読み込みしてログ更新
          setTimeout(() => init(), 1000);
        } else {
          resultEl.className = 'error-message';
          resultEl.textContent = res.message;
          btn.disabled = false;
        }
      } catch (e) {
        resultEl.className = 'error-message';
        resultEl.textContent = '通信エラー: ' + e.message;
        btn.disabled = false;
      }
    });

    init();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR打刻スキャン</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    body { background: #1a1a2e; color: #fff; }
    .scan-container { max-width: 480px; margin: 0 auto; padding: 16px; text-align: center; }
    h1 { font-size: 20px; margin: 16px 0 8px; }
    #start-btn {
      padding: 20px 40px;
      font-size: 18px;
      background: #1A73E8;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin: 40px 0;
    }
    #video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      margin: 12px 0;
      display: none;
    }
    #video { width: 100%; height: 100%; object-fit: cover; }
    #scan-guide {
      position: absolute;
      inset: 20%;
      border: 2px solid rgba(26,115,232,0.7);
      border-radius: 8px;
    }
    #status { font-size: 14px; color: #aaa; margin: 8px 0; }
    #manual-input {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    #manual-input input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #2a2a3e;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="scan-container">
    <h1>QR打刻スキャン</h1>
    <button id="start-btn" onclick="startScan()">QRコード読取り</button>
    <div id="video-container">
      <video id="video" autoplay playsinline></video>
      <div id="scan-guide"></div>
      <button id="switch-cam-btn" onclick="switchCamera()" style="position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,0.5);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;">カメラ切替</button>
    </div>
    <div id="status"></div>
    <div id="manual-input">
      <input type="text" id="codeInput" placeholder="従業員コードを入力">
      <button class="btn btn-primary" onclick="handleCode(document.getElementById('codeInput').value)">確認</button>
    </div>
  </div>

  <!-- jsQR: iOS Safari は BarcodeDetector 非対応のためフォールバック用 -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    const video = document.getElementById('video');
    const statusEl = document.getElementById('status');
    let scanning = true;
    let scanTimer = null;
    let useFrontCamera = false;

    function startScan() {
      scanning = true;
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('video-container').style.display = 'block';
      statusEl.textContent = 'カメラを起動中...';
      // 20秒後にタイムアウトで初期画面に戻る
      scanTimer = setTimeout(() => {
        scanning = false;
        stopCamera();
        document.getElementById('video-container').style.display = 'none';
        document.getElementById('start-btn').style.display = '';
        statusEl.textContent = 'タイムアウトしました。もう一度お試しください。';
      }, 20000);
      startCamera();
    }

    function stopCamera() {
      const stream = video.srcObject;
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        video.srcObject = null;
      }
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: useFrontCamera ? 'user' : 'environment', width: { ideal: 640 }, height: { ideal: 640 } }
        });
        video.srcObject = stream;
        statusEl.textContent = 'QRコードをかざしてください';
        detectQR();
      } catch (e) {
        statusEl.textContent = 'カメラを起動できません。コードを手動入力してください。';
        console.error(e);
      }
    }

    function switchCamera() {
      useFrontCamera = !useFrontCamera;
      stopCamera();
      startCamera();
    }

    function detectQR() {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      // BarcodeDetector 対応ブラウザ（Android Chrome 等）
      if ('BarcodeDetector' in window) {
        const detector = new BarcodeDetector({ formats: ['qr_code'] });
        const scan = async () => {
          if (!scanning || video.readyState < 2) {
            requestAnimationFrame(scan);
            return;
          }
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0);
          try {
            const codes = await detector.detect(canvas);
            if (codes.length > 0) {
              scanning = false;
              handleCode(codes[0].rawValue, true);
              return;
            }
          } catch (e) {}
          requestAnimationFrame(scan);
        };
        scan();
        return;
      }

      // jsQR フォールバック（iOS Safari 等）
      const scan = () => {
        if (!scanning || video.readyState < 2) {
          requestAnimationFrame(scan);
          return;
        }
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const qr = jsQR(imageData.data, canvas.width, canvas.height);
        if (qr && qr.data) {
          scanning = false;
          handleCode(qr.data, true);
          return;
        }
        requestAnimationFrame(scan);
      };
      scan();
    }

    /**
     * QRコード or 手動入力から従業員コードを処理する。
     * @param {string} raw - 読み取った文字列
     * @param {boolean} [fromQR=false] - QRコード経由の場合 true
     */
    function handleCode(raw, fromQR) {
      let code = (raw || '').trim();
      if (!code) return;
      // QR読み取りの場合、末尾の複製防止文字列（5文字）を除去
      if (fromQR && code.length > 5) {
        code = code.slice(0, -5);
      }
      if (scanTimer) { clearTimeout(scanTimer); scanTimer = null; }
      stopCamera();
      // 従業員マスタからキャッシュ済みの名前を渡して即時表示
      const emp = window._empCache && window._empCache[code];
      const q = new URLSearchParams({ id: code });
      if (emp) {
        q.set('name', emp.name);
        q.set('store', emp.store);
      }
      location.href = `attendance.html?${q}`;
    }

    // ====================================================================
    // 従業員キャッシュ（localStorage蓄積型・認証不要）
    // ====================================================================
    const EMP_CACHE_KEY = 'KINTAI_EMP_CACHE';

    // localStorageから即時復元
    try {
      const cached = localStorage.getItem(EMP_CACHE_KEY);
      if (cached) window._empCache = JSON.parse(cached);
    } catch (e) {}
    if (!window._empCache) window._empCache = {};

  </script>
</body>
</html>

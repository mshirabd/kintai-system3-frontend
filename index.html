<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR打刻スキャン</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    body { background: #1a1a2e; color: #fff; }
    .scan-container { max-width: 480px; margin: 0 auto; padding: 16px; text-align: center; }
    h1 { font-size: 20px; margin: 16px 0 8px; }
    #video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      margin: 12px 0;
    }
    #video { width: 100%; height: 100%; object-fit: cover; }
    #scan-guide {
      position: absolute;
      inset: 20%;
      border: 2px solid rgba(26,115,232,0.7);
      border-radius: 8px;
    }
    #status { font-size: 14px; color: #aaa; margin: 8px 0; }
    #manual-input {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    #manual-input input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #2a2a3e;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="scan-container">
    <h1>QR打刻スキャン</h1>
    <div id="video-container">
      <video id="video" autoplay playsinline></video>
      <div id="scan-guide"></div>
    </div>
    <div id="status">カメラを起動中...</div>
    <div id="manual-input">
      <input type="text" id="codeInput" placeholder="従業員コードを入力">
      <button class="btn btn-primary" onclick="handleCode(document.getElementById('codeInput').value)">確認</button>
    </div>
  </div>

  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    const video = document.getElementById('video');
    const statusEl = document.getElementById('status');
    let scanning = true;

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } }
        });
        video.srcObject = stream;
        statusEl.textContent = 'QRコードをかざしてください';
        detectQR();
      } catch (e) {
        statusEl.textContent = 'カメラを起動できません。コードを手動入力してください。';
        console.error(e);
      }
    }

    function detectQR() {
      if (!('BarcodeDetector' in window)) {
        statusEl.textContent = 'QR読取非対応のブラウザです。コードを手動入力してください。';
        return;
      }
      const detector = new BarcodeDetector({ formats: ['qr_code'] });
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      const scan = async () => {
        if (!scanning || video.readyState < 2) {
          requestAnimationFrame(scan);
          return;
        }
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        try {
          const codes = await detector.detect(canvas);
          if (codes.length > 0) {
            scanning = false;
            handleCode(codes[0].rawValue);
            return;
          }
        } catch (e) {}
        requestAnimationFrame(scan);
      };
      scan();
    }

    async function handleCode(code) {
      code = (code || '').trim();
      if (!code) return;
      statusEl.textContent = `${code} を確認中...`;
      try {
        const res = await api.getEmployeeInfo(code);
        if (res.success) {
          location.href = `attendance.html?id=${encodeURIComponent(code)}`;
        } else {
          statusEl.textContent = res.message || '従業員が見つかりません。';
          scanning = true;
        }
      } catch (e) {
        statusEl.textContent = '通信エラー: ' + e.message;
        scanning = true;
      }
    }

    startCamera();
  </script>
</body>
</html>

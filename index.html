<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR打刻</title>
  <link rel="stylesheet" href="css/common.css">
  <style>
    body { background: #1a1a2e; color: #fff; }

    /* ── QRスキャン画面 ──────────────────────── */
    .scan-container { max-width: 480px; margin: 0 auto; padding: 16px; text-align: center; }
    .scan-container h1 { font-size: 20px; margin: 16px 0 8px; }
    #start-btn {
      padding: 20px 40px;
      font-size: 18px;
      background: #1A73E8;
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin: 40px 0;
    }
    #video-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      margin: 12px 0;
      display: none;
    }
    #video { width: 100%; height: 100%; object-fit: cover; }
    #scan-guide {
      position: absolute;
      inset: 20%;
      border: 2px solid rgba(26,115,232,0.7);
      border-radius: 8px;
    }
    #status { font-size: 14px; color: #aaa; margin: 8px 0; }
    #manual-input {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }
    #manual-input input {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #2a2a3e;
      color: #fff;
    }

    /* ── 打刻画面 ────────────────────────────── */
    #attendance-view { display: none; }
    #attendance-view body { background: #f5f5f5; }
    .attendance-header { text-align: center; padding: 16px 0; }
    .emp-name { font-size: 22px; font-weight: bold; color: #333; }
    .store-name { font-size: 14px; color: #666; }
    #result {
      text-align: center;
      padding: 16px;
      margin: 12px 0;
      border-radius: 8px;
      font-size: 16px;
      display: none;
    }
  </style>
</head>
<body>

  <!-- ===== QRスキャン画面 ===== -->
  <div id="scan-view">
    <div class="scan-container">
      <h1>QR打刻スキャン</h1>
      <button id="start-btn" onclick="startScan()">QRコード読取り</button>
      <div id="video-container">
        <video id="video" autoplay playsinline></video>
        <div id="scan-guide"></div>
      </div>
      <div id="status"></div>
      <div id="manual-input">
        <input type="text" id="codeInput" placeholder="従業員コードを入力">
        <button class="btn btn-primary" onclick="handleCode(document.getElementById('codeInput').value)">確認</button>
      </div>
    </div>
  </div>

  <!-- ===== 打刻画面 ===== -->
  <div id="attendance-view">
    <div class="container-narrow">
      <div class="card">
        <div class="attendance-header">
          <div class="clock" id="clock"></div>
          <div class="emp-name" id="empName"></div>
          <div class="store-name" id="storeName"></div>
        </div>

        <div class="punch-buttons" id="punchButtons">
          <button class="punch-btn clock-in" data-type="出勤">出勤</button>
          <button class="punch-btn clock-out" data-type="退勤">退勤</button>
          <button class="punch-btn break-start" data-type="休憩開始">休憩開始</button>
          <button class="punch-btn break-end" data-type="休憩終了">休憩終了</button>
          <button class="punch-btn meal" data-type="賄い(昼)">まかない(昼)</button>
          <button class="punch-btn meal" data-type="賄い(夜)">まかない(夜)</button>
        </div>

        <div id="result"></div>

        <div style="text-align:center;margin-top:20px;">
          <a href="#" onclick="showScanView();return false;" style="color:#1A73E8;font-size:14px;text-decoration:none;">← QRスキャンに戻る</a>
        </div>
      </div>
    </div>
  </div>

  <!-- jsQR: iOS Safari は BarcodeDetector 非対応のためフォールバック用 -->
  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/api.js"></script>
  <script>
    // ====================================================================
    // 画面切り替え
    // ====================================================================
    let currentEmployeeCode = '';
    let idleTimer = null;

    function showScanView() {
      clearIdleTimer();
      currentEmployeeCode = '';
      document.getElementById('scan-view').style.display = '';
      document.getElementById('attendance-view').style.display = 'none';
      document.body.style.background = '#1a1a2e';
      document.body.style.color = '#fff';
      // スキャン画面の状態をリセット
      document.getElementById('start-btn').style.display = '';
      document.getElementById('video-container').style.display = 'none';
      document.getElementById('status').textContent = '';
      document.getElementById('codeInput').value = '';
      scanning = false;
      stopCamera();
    }

    function showAttendanceView(code, name, store) {
      currentEmployeeCode = code;
      document.getElementById('scan-view').style.display = 'none';
      document.getElementById('attendance-view').style.display = 'block';
      document.body.style.background = '#f5f5f5';
      document.body.style.color = '#333';

      // 名前・店舗を即時表示
      document.getElementById('empName').textContent = name || code;
      document.getElementById('storeName').textContent = store || '';

      // ボタンをリセット
      document.querySelectorAll('.punch-btn').forEach(b => b.disabled = false);
      const resultEl = document.getElementById('result');
      resultEl.style.display = 'none';
      resultEl.textContent = '';

      // 時計を開始
      startClock('clock');

      // 15秒無操作でQRスキャンに戻る
      startIdleTimer();

      // バックグラウンドで打刻状態を取得してボタンを制御
      loadAttendanceStatus(code, name);
    }

    function startIdleTimer() {
      clearIdleTimer();
      idleTimer = setTimeout(showScanView, 15000);
    }

    function clearIdleTimer() {
      if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
    }

    // タッチ/クリックでアイドルタイマーリセット
    document.addEventListener('click', () => { if (currentEmployeeCode) startIdleTimer(); });
    document.addEventListener('touchstart', () => { if (currentEmployeeCode) startIdleTimer(); });

    // ====================================================================
    // 打刻画面ロジック
    // ====================================================================

    async function loadAttendanceStatus(code, preloadName) {
      try {
        // getEmployeeInfo 1回で名前・店舗・打刻ログを全て取得
        const info = await api.getEmployeeInfo(code);
        if (info.success) {
          // 名前・店舗を更新（キャッシュヒット時も最新化）
          document.getElementById('empName').textContent = info.employeeName;
          document.getElementById('storeName').textContent = info.storeName;
          // ボタン状態を更新
          updateButtons(info.todayLogs || []);
          // キャッシュに保存（次回から即時表示）
          saveEmpCache(code, info.employeeName, info.storeName);
        } else {
          if (!preloadName) {
            document.getElementById('empName').textContent = info.message || 'エラー';
          }
        }
      } catch (e) {}
    }

    function updateButtons(logs) {
      const types = logs.map(l => l.type);
      document.querySelectorAll('.punch-btn').forEach(btn => {
        if (types.includes(btn.dataset.type)) btn.disabled = true;
      });
    }

    // 打刻ボタンクリック
    document.getElementById('punchButtons').addEventListener('click', async (e) => {
      const btn = e.target.closest('.punch-btn');
      if (!btn || btn.disabled) return;

      const type = btn.dataset.type;
      btn.disabled = true;

      const resultEl = document.getElementById('result');
      resultEl.style.display = 'block';
      resultEl.className = '';
      resultEl.textContent = '送信中...';

      try {
        const res = await api.processAttendance({
          employeeId: currentEmployeeCode,
          attendanceType: type,
        });
        if (res.success) {
          resultEl.className = 'success-message';
          resultEl.textContent = '打刻しました';
          document.querySelectorAll('.punch-btn').forEach(b => b.disabled = true);
          clearIdleTimer();
          setTimeout(showScanView, 3000);
        } else {
          resultEl.className = 'error-message';
          resultEl.textContent = res.message;
          btn.disabled = false;
        }
      } catch (e) {
        resultEl.className = 'error-message';
        resultEl.textContent = '通信エラー: ' + e.message;
        btn.disabled = false;
      }
    });

    // ====================================================================
    // QRスキャンロジック
    // ====================================================================
    const video = document.getElementById('video');
    const statusEl = document.getElementById('status');
    let scanning = false;
    let scanTimer = null;

    function startScan() {
      scanning = true;
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('video-container').style.display = 'block';
      statusEl.textContent = 'カメラを起動中...';
      scanTimer = setTimeout(() => {
        scanning = false;
        stopCamera();
        document.getElementById('video-container').style.display = 'none';
        document.getElementById('start-btn').style.display = '';
        statusEl.textContent = 'タイムアウトしました。もう一度お試しください。';
      }, 20000);
      startCamera();
    }

    function stopCamera() {
      const stream = video.srcObject;
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        video.srcObject = null;
      }
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 640 } }
        });
        video.srcObject = stream;
        statusEl.textContent = 'QRコードをかざしてください';
        detectQR();
      } catch (e) {
        statusEl.textContent = 'カメラを起動できません。コードを手動入力してください。';
        console.error(e);
      }
    }

    function detectQR() {
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');

      if ('BarcodeDetector' in window) {
        const detector = new BarcodeDetector({ formats: ['qr_code'] });
        const scan = async () => {
          if (!scanning || video.readyState < 2) {
            requestAnimationFrame(scan);
            return;
          }
          canvas.width = video.videoWidth;
          canvas.height = video.videoHeight;
          ctx.drawImage(video, 0, 0);
          try {
            const codes = await detector.detect(canvas);
            if (codes.length > 0) {
              scanning = false;
              handleCode(codes[0].rawValue, true);
              return;
            }
          } catch (e) {}
          requestAnimationFrame(scan);
        };
        scan();
        return;
      }

      // jsQR フォールバック（iOS Safari 等）
      const scan = () => {
        if (!scanning || video.readyState < 2) {
          requestAnimationFrame(scan);
          return;
        }
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const qr = jsQR(imageData.data, canvas.width, canvas.height);
        if (qr && qr.data) {
          scanning = false;
          handleCode(qr.data, true);
          return;
        }
        requestAnimationFrame(scan);
      };
      scan();
    }

    function handleCode(raw, fromQR) {
      let code = (raw || '').trim();
      if (!code) return;
      if (fromQR && code.length > 5) {
        code = code.slice(0, -5);
      }
      if (scanTimer) { clearTimeout(scanTimer); scanTimer = null; }
      stopCamera();

      const emp = window._empCache && window._empCache[code];
      showAttendanceView(code, emp ? emp.name : '', emp ? emp.store : '');
    }

    // ====================================================================
    // 従業員キャッシュ（localStorage蓄積型・認証不要）
    // ====================================================================
    const EMP_CACHE_KEY = 'KINTAI_EMP_CACHE';

    // localStorageから即時復元
    try {
      const cached = localStorage.getItem(EMP_CACHE_KEY);
      if (cached) window._empCache = JSON.parse(cached);
    } catch (e) {}
    if (!window._empCache) window._empCache = {};

    // 個別にキャッシュを保存（打刻のたびに蓄積される）
    function saveEmpCache(code, name, store) {
      window._empCache[code] = { name: name, store: store || '' };
      try {
        localStorage.setItem(EMP_CACHE_KEY, JSON.stringify(window._empCache));
      } catch (e) {}
    }

    // ====================================================================
    // URLパラメータからの打刻画面直接表示（attendance.htmlからのリダイレクト対応）
    // ====================================================================
    (function() {
      const p = new URLSearchParams(location.search);
      const id = p.get('id');
      if (id) {
        const name  = p.get('name') || (window._empCache[id] && window._empCache[id].name) || '';
        const store = p.get('store') || (window._empCache[id] && window._empCache[id].store) || '';
        // URLパラメータをクリーンアップ
        history.replaceState(null, '', location.pathname);
        showAttendanceView(id, name, store);
      }
    })();
  </script>
</body>
</html>

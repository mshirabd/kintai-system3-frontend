<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>システム設定 - 勤怠管理</title>
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <div id="nav-container"></div>
  <div class="container">
    <h1 style="font-size:20px;margin-bottom:16px;">システム設定</h1>
    <div class="card">
      <div id="settingsTable"><div class="loading">読み込み中...</div></div>
    </div>
  </div>

  <!-- 編集モーダル -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h3>設定値の編集</h3>
      <form id="editForm">
        <input type="hidden" id="editKey">
        <div class="form-group">
          <label>設定キー</label>
          <div id="editKeyDisplay" style="font-weight:bold;font-size:15px;padding:8px 0;"></div>
        </div>
        <div class="form-group">
          <label id="editDescLabel">説明</label>
          <div id="editDesc" style="font-size:13px;color:#666;padding:4px 0;"></div>
        </div>
        <div class="form-group">
          <label>値</label>
          <input type="text" id="editValue" class="form-control">
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">
          <button type="button" class="btn btn-secondary" onclick="closeEditModal()">キャンセル</button>
          <button type="submit" class="btn btn-primary">保存</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/nav.js"></script>
  <script>
    if (!auth.requireAdmin()) throw '';
    renderNav('settings');

    let settings = [];

    async function load() {
      try {
        settings = await api.getSystemSettings();
        render();
      } catch (e) {
        showError(document.getElementById('settingsTable'), e.message);
      }
    }

    function render() {
      const el = document.getElementById('settingsTable');
      if (!settings || settings.length === 0) {
        el.innerHTML = '<div style="color:#999;padding:12px;">設定項目がありません</div>';
        return;
      }
      el.innerHTML = `<table>
        <tr><th>設定キー</th><th>値</th><th>説明</th><th>操作</th></tr>
        ${settings.map(s => `<tr>
          <td style="font-weight:600;white-space:nowrap;">${escHtml(s.key)}</td>
          <td>${escHtml(s.value)}</td>
          <td style="font-size:12px;color:#666;">${escHtml(s.description)}</td>
          <td><button class="btn btn-sm btn-primary" onclick="openEdit('${escHtml(s.key)}')">編集</button></td>
        </tr>`).join('')}
      </table>`;
    }

    function openEdit(key) {
      const s = settings.find(x => x.key === key);
      if (!s) return;
      document.getElementById('editKey').value = key;
      document.getElementById('editKeyDisplay').textContent = key;
      document.getElementById('editDesc').textContent = s.description || '(説明なし)';
      document.getElementById('editValue').value = s.value;
      document.getElementById('editModal').classList.add('open');
    }

    function closeEditModal() {
      document.getElementById('editModal').classList.remove('open');
    }

    document.getElementById('editForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const key   = document.getElementById('editKey').value;
      const value = document.getElementById('editValue').value;
      try {
        const res = await api.updateSystemSetting(key, value);
        if (res.success) { closeEditModal(); load(); }
        else alert(res.message || 'エラー');
      } catch (err) { alert('通信エラー: ' + err.message); }
    });

    load();
  </script>
</body>
</html>

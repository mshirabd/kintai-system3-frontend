<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ダッシュボード - 勤怠管理</title>
  <link rel="stylesheet" href="../css/common.css">
</head>
<body>
  <div id="nav-container"></div>
  <div class="container">
    <h1 style="font-size:20px;margin-bottom:16px;">ダッシュボード</h1>

    <div style="margin-bottom:16px;">
      <select id="storeFilter" class="form-control" style="max-width:240px;">
        <option value="">全店舗</option>
      </select>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px;">
      <div class="card" style="text-align:center;">
        <div style="font-size:13px;color:#666;">出勤者数</div>
        <div id="clockedIn" style="font-size:32px;font-weight:bold;color:#34A853;">-</div>
      </div>
      <div class="card" style="text-align:center;">
        <div style="font-size:13px;color:#666;">勤務中</div>
        <div id="inProgress" style="font-size:32px;font-weight:bold;color:#1A73E8;">-</div>
      </div>
      <div class="card" style="text-align:center;">
        <div style="font-size:13px;color:#666;">退勤済</div>
        <div id="clockedOut" style="font-size:32px;font-weight:bold;color:#888;">-</div>
      </div>
      <div class="card" style="text-align:center;">
        <div style="font-size:13px;color:#666;">未対応アラート</div>
        <div id="pendingAlerts" style="font-size:32px;font-weight:bold;color:#EA4335;">-</div>
      </div>
    </div>

    <div class="card">
      <h2>最近の打刻</h2>
      <div id="recentLogs"><div class="loading">読み込み中...</div></div>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/nav.js"></script>
  <script>
    if (!auth.requireAdmin()) throw '';
    renderNav('dashboard');

    async function loadDashboard(storeId) {
      try {
        const data = await api.getDashboardData(storeId);
        document.getElementById('clockedIn').textContent = data.clockedIn || 0;
        document.getElementById('inProgress').textContent = data.inProgress || 0;
        document.getElementById('clockedOut').textContent = data.clockedOut || 0;
        document.getElementById('pendingAlerts').textContent = data.pendingAlerts || 0;

        const logs = data.recentLogs || [];
        const el = document.getElementById('recentLogs');
        if (logs.length === 0) {
          el.innerHTML = '<div style="color:#999;padding:12px;">打刻データがありません</div>';
          return;
        }
        el.innerHTML = `<table>
          <tr><th>日付</th><th>時刻</th><th>氏名</th><th>種別</th></tr>
          ${logs.map(l => `<tr>
            <td>${escHtml(l.date)}</td>
            <td>${escHtml(l.time)}</td>
            <td>${escHtml(l.empName)}</td>
            <td>${escHtml(l.type)}</td>
          </tr>`).join('')}
        </table>`;
      } catch (e) {
        showError(document.getElementById('recentLogs'), e.message);
      }
    }

    // 店舗フィルタ
    async function loadStores() {
      try {
        const stores = await api.getStores();
        const sel = document.getElementById('storeFilter');
        (stores || []).forEach(s => {
          const opt = document.createElement('option');
          opt.value = s.id;
          opt.textContent = s.name;
          sel.appendChild(opt);
        });
      } catch (e) {}
    }

    document.getElementById('storeFilter').addEventListener('change', (e) => {
      loadDashboard(e.target.value);
    });

    loadStores();
    loadDashboard('');
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ダミーデータ登録</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
    #log { background: #f5f5f5; padding: 16px; border-radius: 8px; white-space: pre-line; font-size: 14px; min-height: 200px; }
    button { padding: 12px 24px; font-size: 16px; background: #1A73E8; color: #fff; border: none; border-radius: 6px; cursor: pointer; }
    button:disabled { background: #ccc; }
    .ok { color: green; }
    .ng { color: red; }
  </style>
</head>
<body>
  <h1>ダミーデータ一括登録</h1>
  <p>従業員15件を登録します。</p>
  <button id="btn" onclick="run()">登録開始</button>
  <div id="log"></div>

  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script>
    if (!auth.requireAdmin()) throw '';

    const log = document.getElementById('log');
    function addLog(msg, ok) {
      const span = document.createElement('span');
      span.className = ok ? 'ok' : (ok === false ? 'ng' : '');
      span.textContent = msg + '\n';
      log.appendChild(span);
    }

    async function run() {
      const btn = document.getElementById('btn');
      btn.disabled = true;
      log.innerHTML = '';

      const stores = [
        { id:'STR001', name:'炭火焼肉 眞瀬（本店）', address:'〒560-0014 大阪府豊中市熊野町4丁目12-23-101' },
        { id:'STR002', name:'炭火焼肉 眞瀬 小野原店', address:'〒562-0032 大阪府箕面市小野原西6丁目11-21' },
        { id:'STR003', name:'眞瀬別邸',               address:'〒560-0005 大阪府豊中市西緑丘3丁目26-23' },
        { id:'STR004', name:'眞瀬精肉店',             address:'〒560-0014 大阪府豊中市熊野町4-11-9' },
      ];

      const emps = [
        { id:'EMP001', name:'田中 太郎',   employmentType:'正社員',     storeId:'STR001' },
        { id:'EMP002', name:'山田 花子',   employmentType:'正社員',     storeId:'STR001' },
        { id:'EMP003', name:'佐藤 健一',   employmentType:'正社員',     storeId:'STR002' },
        { id:'EMP004', name:'鈴木 美咲',   employmentType:'正社員',     storeId:'STR003' },
        { id:'EMP005', name:'高橋 大輔',   employmentType:'正社員',     storeId:'STR004' },
        { id:'EMP006', name:'中村 さくら', employmentType:'パート',     storeId:'STR001' },
        { id:'EMP007', name:'小林 由美',   employmentType:'パート',     storeId:'STR001' },
        { id:'EMP008', name:'加藤 恵子',   employmentType:'パート',     storeId:'STR002' },
        { id:'EMP009', name:'吉田 明美',   employmentType:'パート',     storeId:'STR003' },
        { id:'EMP010', name:'松本 和子',   employmentType:'パート',     storeId:'STR004' },
        { id:'EMP011', name:'渡辺 翔太',   employmentType:'アルバイト', storeId:'STR001' },
        { id:'EMP012', name:'伊藤 真由',   employmentType:'アルバイト', storeId:'STR001' },
        { id:'EMP013', name:'木村 悠斗',   employmentType:'アルバイト', storeId:'STR002' },
        { id:'EMP014', name:'林 美月',     employmentType:'アルバイト', storeId:'STR003' },
        { id:'EMP015', name:'清水 蓮',     employmentType:'アルバイト', storeId:'STR004' },
      ];

      addLog('=== 従業員登録 ===');
      for (const e of emps) {
        try {
          const r = await api.addEmployee(e);
          addLog(`${e.id} ${e.name} (${e.employmentType}): ${r.success ? 'OK' : (r.message || 'エラー')}`, r.success);
        } catch (err) {
          addLog(`${e.id} ${e.name}: ${err.message}`, false);
        }
      }

      addLog('\n完了！');
      btn.disabled = false;
    }
  </script>
</body>
</html>

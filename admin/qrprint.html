<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRコード印刷 - 勤怠管理</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    .qr-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 16px;
      margin-top: 16px;
    }
    .qr-card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      background: #fff;
      break-inside: avoid;
    }
    .qr-card canvas { margin: 8px 0; }
    .qr-name { font-weight: bold; font-size: 16px; }
    .qr-id { font-size: 12px; color: #666; }
    @media print {
      .no-print { display: none !important; }
      .qr-grid { gap: 8px; }
      .qr-card { border: 1px solid #999; padding: 12px; }
    }
  </style>
</head>
<body>
  <div id="nav-container" class="no-print"></div>
  <div class="container">
    <div class="no-print" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h1 style="font-size:20px;">QRコード印刷</h1>
      <button class="btn btn-primary" onclick="window.print()">印刷</button>
    </div>
    <div id="qrArea"><div class="loading">読み込み中...</div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/nav.js"></script>
  <script>
    if (!auth.requireAdmin()) throw '';
    renderNav('qrprint');

    async function load() {
      const el = document.getElementById('qrArea');
      try {
        const emps = await api.getAllEmployees();
        const active = (emps || []).filter(e => e.status === '有効')
          .sort((a, b) => a.name.localeCompare(b.name, 'ja'));

        if (active.length === 0) {
          el.innerHTML = '<div style="color:#999;">有効な従業員がいません</div>';
          return;
        }

        el.innerHTML = '<div class="qr-grid">' +
          active.map(e => `
            <div class="qr-card">
              <div class="qr-name">${escHtml(e.name)}</div>
              <div class="qr-id">${escHtml(e.id)}</div>
              <canvas id="qr-${e.id}"></canvas>
            </div>
          `).join('') + '</div>';

        // QRコード生成（従業員コードのみ）
        active.forEach(e => {
          QRCode.toCanvas(document.getElementById('qr-' + e.id), e.id, {
            width: 160,
            margin: 1,
            errorCorrectionLevel: 'M',
          });
        });
      } catch (e) {
        showError(el, e.message);
      }
    }

    load();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRコード印刷 - 勤怠管理</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    /* ── 画面表示用 ─────────────────────────── */
    .qr-grid {
      display: grid;
      grid-template-columns: repeat(2, 91mm);
      grid-auto-rows: 55mm;
      gap: 0;
      justify-content: center;
      margin-top: 16px;
    }
    .qr-card {
      width: 91mm;
      height: 55mm;
      border: 1px solid #ddd;
      box-sizing: border-box;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 4px 8px;
      background: #fff;
      overflow: hidden;
    }
    .qr-card canvas { flex-shrink: 0; }
    .qr-info { text-align: left; }
    .qr-name { font-weight: bold; font-size: 14px; line-height: 1.3; }
    .qr-id { font-size: 11px; color: #666; }
    .qr-store { font-size: 11px; color: #888; margin-top: 2px; }

    /* ── 印刷用 ───────────────────────────── */
    @media print {
      .no-print { display: none !important; }
      @page {
        size: A4 portrait;
        margin: 0;
      }
      body { margin: 0; padding: 0; }
      .container { padding: 0; max-width: none; }
      .qr-grid {
        margin: 0;
        padding: 11mm 14mm;
        gap: 0;
      }
      .qr-card {
        border: none;
      }
    }
  </style>
</head>
<body>
  <div id="nav-container" class="no-print"></div>
  <div class="container">
    <div class="no-print" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h1 style="font-size:20px;">QRコード印刷</h1>
      <button class="btn btn-primary" onclick="window.print()">印刷</button>
    </div>
    <div id="qrArea"><div class="loading">読み込み中...</div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/nav.js"></script>
  <script>
    if (!auth.requireAdmin()) throw '';
    renderNav('qrprint');

    async function load() {
      const el = document.getElementById('qrArea');
      try {
        const emps = await api.getAllEmployees();
        const active = (emps || []).filter(e => e.status === '有効')
          .sort((a, b) => a.name.localeCompare(b.name, 'ja'));

        if (active.length === 0) {
          el.innerHTML = '<div style="color:#999;">有効な従業員がいません</div>';
          return;
        }

        el.innerHTML = '<div class="qr-grid">' +
          active.map(e => `
            <div class="qr-card">
              <canvas id="qr-${e.id}"></canvas>
              <div class="qr-info">
                <div class="qr-name">${escHtml(e.name)}</div>
                <div class="qr-id">${escHtml(e.id)}</div>
                <div class="qr-store">${escHtml(e.storeName || '')}</div>
              </div>
            </div>
          `).join('') + '</div>';

        // QRコード生成（従業員コードのみ）
        active.forEach(e => {
          QRCode.toCanvas(document.getElementById('qr-' + e.id), e.id, {
            width: 120,
            margin: 1,
            errorCorrectionLevel: 'M',
          });
        });
      } catch (e) {
        showError(el, e.message);
      }
    }

    load();
  </script>
</body>
</html>

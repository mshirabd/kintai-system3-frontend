<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QRコード印刷 - 勤怠管理</title>
  <link rel="stylesheet" href="../css/common.css">
  <style>
    /* ── 画面表示用 ─────────────────────────── */
    .qr-page {
      width: 210mm;
      height: 297mm;
      margin: 0 auto 20px;
      padding: 11mm 14mm;
      box-sizing: border-box;
      display: grid;
      grid-template-columns: 91mm 91mm;
      grid-template-rows: repeat(5, 55mm);
      gap: 0;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .qr-card {
      width: 91mm;
      height: 55mm;
      border: 1px solid #ddd;
      box-sizing: border-box;
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      padding: 4px 12px;
      overflow: hidden;
    }
    .qr-card canvas { flex-shrink: 0; }
    .qr-info { text-align: left; min-width: 0; }
    .qr-name { font-weight: bold; font-size: 14px; line-height: 1.3; }
    .qr-id { font-size: 11px; color: #666; }

    /* ── 印刷用 ───────────────────────────── */
    @media print {
      .no-print { display: none !important; }
      @page {
        size: A4 portrait;
        margin: 0;
      }
      html, body {
        margin: 0;
        padding: 0;
        -webkit-print-color-adjust: exact;
      }
      .container { padding: 0; max-width: none; }
      .qr-page {
        box-shadow: none;
        margin: 0;
        page-break-after: always;
      }
      .qr-page:last-child {
        page-break-after: auto;
      }
      .qr-card {
        border: none;
      }
    }
  </style>
</head>
<body>
  <div id="nav-container" class="no-print"></div>
  <div class="container">
    <div class="no-print" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h1 style="font-size:20px;">QRコード印刷</h1>
      <button class="btn btn-primary" onclick="window.print()">印刷</button>
    </div>
    <div id="qrArea"><div class="loading">読み込み中...</div></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
  <script src="../js/utils.js"></script>
  <script src="../js/auth.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/nav.js"></script>
  <script>
    if (!auth.requireAdmin()) throw '';
    renderNav('qrprint');

    async function load() {
      const el = document.getElementById('qrArea');
      try {
        const emps = await api.getAllEmployees();
        const active = (emps || []).filter(e => e.status === '有効')
          .sort((a, b) => (a.storeId || '').localeCompare(b.storeId || '') || (a.id || '').localeCompare(b.id || ''));

        if (active.length === 0) {
          el.innerHTML = '<div style="color:#999;">有効な従業員がいません</div>';
          return;
        }

        // 10件ずつページに分割
        const pages = [];
        for (let i = 0; i < active.length; i += 10) {
          pages.push(active.slice(i, i + 10));
        }

        el.innerHTML = pages.map(page => {
          const cards = page.map(e => `
            <div class="qr-card">
              <canvas id="qr-${e.id}"></canvas>
              <div class="qr-info">
                <div class="qr-name">${escHtml(e.name)}</div>
                <div class="qr-id">${escHtml(e.id)}</div>
              </div>
            </div>
          `).join('');
          // 空セルで10面を埋める
          const empty = Array(10 - page.length).fill('<div class="qr-card"></div>').join('');
          return `<div class="qr-page">${cards}${empty}</div>`;
        }).join('');

        // QRコード生成（従業員コード + ランダム5文字で複製防止）
        active.forEach(e => {
          const suffix = Array.from({length: 5}, () =>
            'ABCDEFGHJKLMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz23456789'
              [Math.random() * 54 | 0]
          ).join('');
          QRCode.toCanvas(document.getElementById('qr-' + e.id), e.id + suffix, {
            width: 120,
            margin: 1,
            errorCorrectionLevel: 'M',
          });
        });
      } catch (e) {
        showError(el, e.message);
      }
    }

    load();
  </script>
</body>
</html>
